services:
  backend:
    build:
      context: ./backend
    image: profile-backend:1.0.0
    container_name: profile-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_PROFILE_DATA_PATH: /data/profile.json
      APP_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - profile-data:/data
    expose:
      - "8080"
    ports:
      - "8080:8080"
    networks:
      - profile-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    image: profile-frontend:1.0.0
    container_name: profile-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - profile-net

networks:
  profile-net:
    driver: bridge

volumes:
  profile-data:
    driver: local
