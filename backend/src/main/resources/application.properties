server.port=8080
spring.application.name=profile-backend
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Persisted profile data location (overridden in Docker via env: APP_PROFILE_DATA_PATH)
app.profile.data-path=./data/profile.json

# Admin credentials (overridden in Docker via env: APP_ADMIN_USERNAME / APP_ADMIN_PASSWORD)
app.admin.username=admin
app.admin.password=admin
